version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tng-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tng
      POSTGRES_PASSWORD: tng
      POSTGRES_DB: tng_pool
    ports:
      - "5432:5432"
    volumes:
      - tng_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tng -d tng_pool"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tng-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - tng_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tng-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://tng:tng@postgres:5432/tng_pool?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGINS: "*"
      LOG_LEVEL: info
    ports:
      - "4000:4000"
    command: sh -c "npx prisma migrate deploy && node dist/index.js"

volumes:
  tng_pg_data:
  tng_redis_data:
