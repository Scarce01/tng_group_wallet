# App Runner build manifest. Lives at the repo root.
#
# We use docker-based build (not the managed Python runtime) because
# opencv-python pulls in system libs that managed runtimes don't carry.
#
# App Runner watches the configured branch. Every push triggers:
#   pre-build  -> build  -> post-build  -> deploy.
# Set Source directory = backend/ when creating the service so the
# build context matches the Dockerfile path.

version: 1.0
runtime: docker
build:
  commands:
    pre-build:
      - echo "Building TNG Pool Engine"
run:
  runtime-version: latest
  command: sh -c "uvicorn app.main:app --host 0.0.0.0 --port ${PORT}"
  network:
    port: 8000
    env: PORT
  env:
    - name: PORT
      value: "8000"
    - name: LOG_LEVEL
      value: info
    - name: CORS_ORIGINS
      value: "*"
    - name: DATABASE_URL
      value: "postgresql://postgres.qwmwqpijruqdhqpppyfe:apum0425.%21%2C@aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres"
    - name: JWT_ACCESS_SECRET
      value: "change-me-in-prod-access"
    - name: JWT_REFRESH_SECRET
      value: "change-me-in-prod-refresh"
    - name: JWT_ACCESS_EXPIRES_IN
      value: "15m"
    - name: JWT_REFRESH_EXPIRES_IN
      value: "7d"
    - name: TNG_APPROVER_KEY
      value: "dev-tng-approver-key-change-me-32b!!"
    - name: DEVICE_BIND_SECRET
      value: "dev-device-bind-secret-change-me-32b"
